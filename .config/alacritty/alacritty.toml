# ╔══════════════════════════════════════════════════╗
# ║       Alacritty config — Gruvbox Dark Hard       ║
# ╚══════════════════════════════════════════════════╝

[window]
padding = { x = 12, y = 10 }
decorations = "none"
opacity = 0.95
dynamic_title = true

[scrolling]
history = 10000

[font]
normal = { family = "JetBrains Mono", style = "Regular" }
bold   = { family = "JetBrains Mono", style = "Bold" }
italic = { family = "JetBrains Mono", style = "Italic" }
size   = 11.0

[colors.primary]
background = "#1d2021"
foreground = "#ebdbb2"

[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[cursor]
style  = { shape = "Block", blinking = "On" }
blink_interval = 500

[keyboard]
bindings = [
    # Ctrl+Shift+C/V per copia/incolla
    { key = "C", mods = "Control|Shift", action = "Copy" },
    { key = "V", mods = "Control|Shift", action = "Paste" },
    # Zoom font
    { key = "Plus",  mods = "Control", action = "IncreaseFontSize" },
    { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
    { key = "Key0",  mods = "Control", action = "ResetFontSize" },
]
