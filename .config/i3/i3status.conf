# ╔══════════════════════════════════════════════════╗
# ║         i3status config — Gruvbox theme          ║
# ╚══════════════════════════════════════════════════╝

general {
    colors = true
    color_good     = "#98971a"
    color_degraded = "#d79921"
    color_bad      = "#cc241d"
    interval = 5
    output_format = "i3bar"
}

# Ordine da sinistra a destra nella barra
order += "disk /"
order += "memory"
order += "cpu_usage"
order += "wireless _first_"
order += "ethernet _first_"
order += "volume master"
order += "battery all"
order += "tztime local"

disk "/" {
    format = " %avail"
    low_threshold = 10
    threshold_type = "percentage_avail"
}

memory {
    format = " %used / %total"
    threshold_degraded = "1G"
    threshold_critical = "200M"
}

cpu_usage {
    format = " %usage"
    max_threshold = 90
}

wireless _first_ {
    format_up   = " %essid %quality"
    format_down = " off"
}

ethernet _first_ {
    format_up   = " %speed"
    format_down = ""
}

volume master {
    format       = "  %volume"
    format_muted = "  muto"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

battery all {
    format = "%status %percentage"
    format_down = ""
    status_chr = " "
    status_bat = " "
    status_unk = "? "
    status_full = " "
    low_threshold = 15
    threshold_type = percentage
    integer_battery_capacity = true
    last_full_capacity = true
}

tztime local {
    format = " %d/%m  %H:%M"
}
